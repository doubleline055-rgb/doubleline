<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dubole Line — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/admin.css">
<link rel="icon" type="image/jpeg" href="assets/logo-full.jpg">
</head>
<body class="admin-body">

<!-- ===== LOGIN SCREEN ===== -->
<div class="admin-login" id="loginScreen">
  <div class="admin-login__box">
    <img src="assets/logo-full.jpg" alt="Dubole Line" class="admin-login__logo">
    <h1>Admin Login</h1>
    <form id="loginForm">
      <label>
        Email
        <input type="email" id="loginEmail" required>
      </label>
      <label>
        Password
        <input type="password" id="loginPassword" required>
      </label>
      <button type="submit" class="btn btn--amber">Log In</button>
      <p class="admin-login__error" id="loginError"></p>
    </form>
  </div>
</div>

<!-- ===== ADMIN DASHBOARD (hidden until logged in) ===== -->
<div class="admin-dashboard" id="dashboard" hidden>
  <header class="admin-header">
    <img src="assets/logo-full.jpg" alt="Dubole Line" class="admin-header__logo">
    <h1>Admin Panel</h1>
    <button class="btn btn--outline" id="logoutBtn">Log Out</button>
  </header>

  <nav class="admin-tabs" id="adminTabs">
    <button class="admin-tab is-active" data-tab="faqs">FAQs</button>
    <button class="admin-tab" data-tab="plans">Plans</button>
    <button class="admin-tab" data-tab="popup">Popup / Banner</button>
  </nav>

  <!-- FAQ TAB -->
  <section class="admin-panel is-active" id="panel-faqs">
    <h2>Manage FAQs</h2>
    <form id="faqForm" class="admin-form">
      <input type="text" id="faqQuestion" placeholder="Question" required>
      <textarea id="faqAnswer" placeholder="Answer" required></textarea>
      <input type="number" id="faqOrder" placeholder="Order (1, 2, 3...)" required>
      <button type="submit" class="btn btn--amber">Add FAQ</button>
    </form>
    <div class="admin-list" id="faqAdminList">Loading...</div>
  </section>

  <!-- PLANS TAB -->
  <section class="admin-panel" id="panel-plans">
    <h2>Manage Plans</h2>
    <p class="admin-note">Coming in the next step.</p>
  </section>

  <!-- POPUP TAB -->
  <section class="admin-panel" id="panel-popup">
    <h2>Popup / Banner</h2>
    <p class="admin-note">Coming in the next step.</p>
  </section>
</div>

<script type="module" src="js/firebase-config.js"></script>
<script type="module" src="js/admin.js"></script>
</body>
</html>
