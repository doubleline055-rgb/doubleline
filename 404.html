<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — Dubole Line</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="icon" type="image/jpeg" href="assets/logo-full.jpg">
<style>
  .notfound{
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    background: var(--charcoal);
    color: var(--cream);
    padding: 24px;
  }
  .notfound img{ height: 40px; margin-bottom: 32px; }
  .notfound h1{
    font-family: var(--font-display);
    font-size: clamp(60px, 12vw, 120px);
    color: var(--amber);
    line-height: 1;
    margin-bottom: 12px;
  }
  .notfound p{
    font-size: 17px;
    color: rgba(255,252,245,0.75);
    max-width: 380px;
    margin-bottom: 30px;
  }
</style>
</head>
<body>
  <div class="notfound">
    <img src="assets/logo-full.jpg" alt="Dubole Line">
    <h1>404</h1>
    <p>This page doesn't exist — the line got disconnected somewhere.</p>
    <a href="/" class="btn btn--amber">Back to Home</a>
  </div>
</body>
</html>
